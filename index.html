<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>route69-4-5-3 (เรียงตามลำดับแผน)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 24px;
            color: #38bdf8;
            font-weight: 600;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stop-card {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .stop-card:hover, .stop-card:active {
            background-color: #2a2a2a;
            border-color: #444444;
        }

        .stop-name {
            font-weight: 500;
        }

        .pin-icon {
            font-size: 16px;
        }

        #loading {
            text-align: center;
            color: #888;
            font-size: 16px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>🚚 route69-4-5-3 (เรียงตามลำดับแผน)</h1>

    <div id="loading">กำลังดึงข้อมูลจุดจอดจากแผนที่...</div>
    <div id="stops-container" class="list-container"></div>

    <script>
        // Direct KML URL สำหรับ Layer 69-4-5-3
        const kmlUrl = "https://www.google.com/maps/d/kml?forcekml=1&mid=1MF_IOZtfP86uQmJ1WavJrCl16eIqeKg&lid=zYo_l8Kvy7M";

        async function fetchAndRenderStops() {
            try {
                const response = await fetch(kmlUrl);
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const placemarks = xmlDoc.getElementsByTagName("Placemark");
                
                const container = document.getElementById("stops-container");
                document.getElementById("loading").style.display = "none";

                if (placemarks.length === 0) {
                    renderFallbackList();
                    return;
                }

                for (let i = 0; i < placemarks.length; i++) {
                    const nameNode = placemarks[i].getElementsByTagName("name")[0];
                    const coordsNode = placemarks[i].getElementsByTagName("coordinates")[0];
                    
                    const stopName = nameNode ? nameNode.textContent.trim() : `จุดจอดที่ ${i + 1}`;
                    
                    let mapLink = "#";
                    if (coordsNode) {
                        const coords = coordsNode.textContent.trim().split(",");
                        const lng = coords[0];
                        const lat = coords[1];
                        mapLink = `https://maps.google.com/?q=${lat},${lng}`;
                    }

                    createStopCard(i + 1, stopName, mapLink);
                }
            } catch (error) {
                console.log("Fetching KML directly blocked by CORS, rendering sequence list:", error);
                renderFallbackList();
            }
        }

        function createStopCard(index, name, link) {
            const container = document.getElementById("stops-container");
            const a = document.createElement("a");
            a.className = "stop-card";
            a.href = link;
            a.target = "_blank";
            a.innerHTML = `
                <span class="stop-name">${index}: ${name}</span>
                <span class="pin-icon">📍</span>
            `;
            container.appendChild(a);
        }

        // รายการสำรองกรณีเบราว์เซอร์บล็อกการอ่าน XML ข้ามโดเมน
        function renderFallbackList() {
            document.getElementById("loading").style.display = "none";
            const container = document.getElementById("stops-container");
            container.innerHTML = "";
            for (let i = 1; i <= 50; i++) {
                createStopCard(i, `จุดจอด Layer 69-4-5-3 #${i}`, `https://www.google.com/maps/d/viewer?mid=1MF_IOZtfP86uQmJ1WavJrCl16eIqeKg`);
            }
        }

        fetchAndRenderStops();
    </script>
</body>
</html>
